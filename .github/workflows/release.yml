name: Build Release Packages

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Generate timestamp
        id: time
        run: echo "ts=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build Linux package
        run: |
          PKG="alpine-uz801-linux-${{ steps.time.outputs.ts }}"
          mkdir -p "$PKG"
          cp README.md flash.sh "$PKG/"
          cp aboot.mbn hyp.mbn rpm.mbn sbl1.mbn tz.mbn "$PKG/"
          cp boot.bin alpine_rootfs.bin gpt_both0.bin "$PKG/"
          cp fsc.bin fsg.bin modem.bin modemst1.bin modemst2.bin persist.bin sec.bin "$PKG/"
          zip -r "$PKG.zip" "$PKG"

      - name: Build Windows package
        run: |
          PKG="alpine-uz801-windows-${{ steps.time.outputs.ts }}"
          mkdir -p "$PKG"
          cp README.md "一键刷入.bat" "$PKG/"
          sed -i 's/$/\r/' "$PKG/一键刷入.bat"
          cp adb.exe fastboot.exe AdbWinApi.dll AdbWinUsbApi.dll "$PKG/"
          cp aboot.mbn hyp.mbn rpm.mbn sbl1.mbn tz.mbn "$PKG/"
          cp boot.bin alpine_rootfs.bin gpt_both0.bin "$PKG/"
          cp fsc.bin fsg.bin modem.bin modemst1.bin modemst2.bin persist.bin sec.bin "$PKG/"
          zip -r "$PKG.zip" "$PKG"

      - name: Upload packages to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "alpine-uz801-linux-${{ steps.time.outputs.ts }}.zip" \
            "alpine-uz801-windows-${{ steps.time.outputs.ts }}.zip"
